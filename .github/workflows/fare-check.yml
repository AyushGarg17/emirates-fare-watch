name: Fare check

on:
  schedule:
    # Runs at 05:00 UTC (~09:00 Gulf / 10:30 IST), Mon/Wed/Fri.
    # Fares don't move fast enough hour-to-hour to justify running more
    # often than this -- each run spends real (small) API budget.
    - cron: '0 5 * * 1,3,5'
  workflow_dispatch:      # lets you trigger a manual run from the Actions tab
    inputs:
      extra_route:
        description: 'Ad-hoc leg to also check this run, e.g. DEL-DXB or DXB-DEL (blank = skip)'
        required: false
        default: ''
      extra_window:
        description: 'Ad-hoc travel window, e.g. "4-11 Nov 2026" (required if extra_route is set)'
        required: false
        default: ''
      extra_note:
        description: 'Optional note for the ad-hoc leg'
        required: false
        default: ''
      log_trip:
        description: 'Log a trip you booked to trips.json, format: route|date|price|note e.g. DEL-DXB|2026-08-19|15500|booked'
        required: false
        default: ''

permissions:
  contents: write   # the "Commit updated log" step pushes fare_log.json back to the repo

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run AI fare check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EXTRA_ROUTE: ${{ github.event.inputs.extra_route }}
          EXTRA_WINDOW: ${{ github.event.inputs.extra_window }}
          EXTRA_NOTE: ${{ github.event.inputs.extra_note }}
          LOG_TRIP: ${{ github.event.inputs.log_trip }}
        run: python check_fares_ai.py

      - name: Commit updated log
        run: |
          git config user.name "fare-watch-bot"
          git config user.email "actions@github.com"
          git add fare_log.json trips.json
          git diff --quiet --cached || git commit -m "Update fare log"
          git push
